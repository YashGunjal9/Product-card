<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <div class="product-card">

        <span class="discount-tag">20% OFF</span>

        <img src="AstreTech 2026 logo.svg" alt="Product" class="product-image">

        <div class="product-info">

            <h2 class="product-title">Amazing Product</h2>

            <p class="product-price">
                <span class="old-price">₹1249</span>
                ₹999
            </p>

            <p class="product-description">
                Premium quality product with modern design and excellent performance.
            </p>

            <button class="btn-cart">
                <i class="fa-solid fa-cart-shopping"></i>
                Add to Cart
            </button>

        </div>

    </div>

</body>

</html>
